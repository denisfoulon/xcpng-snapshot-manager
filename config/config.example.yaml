application:

  name: XCP-ng Snapshot Manager

logging:

  level: INFO

provider:

  type: xo

xo:

  # The client accepts either the XO root URL or this REST API URL.
  url: https://xoa.domain/rest/v0

  username: admin@xenorchestra.local

  password: yourpassword

report:

  console: true
  json: false
  json_path: reports/report.json
  html: false
  html_path: reports/report.html

compliance:

  snapshot_age:
    warning_days: 7
    critical_days: 30

  snapshot_count:
    warning: 3
    critical: 5

  storage_repository_usage:
    warning_percent: 80
    critical_percent: 90

remediation:

  # audit, dry_run or execute
  mode: audit
  min_age_days: 30
  blacklist_max_age_days: 90
  blacklist_tags: []
  include_orphans: false
  # Required together with mode: execute.
  confirm: false
